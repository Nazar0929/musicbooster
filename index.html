<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/musicbooster/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event-Boster</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/2.0.0/modern-normalize.min.css"
      integrity="sha512-4xo8blKMVCiXpTaLzQSLSw3KFOVPWhm/TRtuPVc4WG6kUgjH6J03IBuG7JZPkcWMxJ5huwaBpOpnwYElP/m6wg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    <script type="module" crossorigin src="/musicbooster/commonHelpers.js"></script>
    <link rel="stylesheet" href="/musicbooster/assets/index-2c09d923.css">
  </head>
  <body>


     <div class="preloader">
  <svg class="progress-ring" width="200" height="200">
    <circle class="progress-ring__circle" stroke="#DC56C5" stroke-width="10" fill="transparent" r="90" cx="100" cy="100"/>
  </svg>
  <div class="preloader__logo">
    <img src="/musicbooster/assets/preloader-c202a03b.png" alt="Event Booster">
  </div>
</div>

   
    <!-- Loads the specified .html file -->

    <header class="header" id="top">
    <div class="container">
        <a href="./header.html" class="header__link"><img src="/musicbooster/assets/logo-4258f148.png" alt="" class="header__image"></a>
        <h1 class="header__title">
            <b>
                F<span>IN</span>D
                <span>BE</span>ST
                <span>EV</span>EN<span>TS</span>
                <span>AR</span>OU<span>ND</span>
                THE
                <span>WO</span>R<span>LD</span>
            </b>
        </h1>


        <form action="" class="header__form">
            <div class="header__icon">
                <input type="text" class="header__input" placeholder="Start searching">
                <!-- <img src="./img/searchicon.png" alt="" class="header__icons-start"> -->
                <svg class="header__icons-start" width="12" height="12">
                    <use href="/musicbooster/assets/searchicons-42c7bad2.svg"></use>
                </svg>
            </div>
            <div class="header__icon country">
                <input type="text" class="header__input" id="countryInput" placeholder="Choose country" readonly />
                <!-- <img src="./img/polygon.png" class="header__icons" /> -->
                <svg class="header__icons" width="12" height="12">
                    <use href="/musicbooster/assets/Polygons-62cff0a7.svg"></use>
                </svg>
                <ul class="country-list"></ul>
            </div>
        </form>

    </div>
</header>



    <!-- Увійти -->

 <div class="auth-wrapper">
    <div class="sign-in-button">Sign in</div>

    <div class="auth-container">
        <button class="login google">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Google_%22G%22_logo.svg/500px-Google_%22G%22_logo.svg.png" alt="Google">
            <span>Sign in with Google</span>
        </button>
        <button class="login guest">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 12C14.21 12 16 10.21 16 8C16 5.79 14.21 4 12 4C9.79 4 8 5.79 8 8C8 10.21 9.79 12 12 12ZM12 14C9.33 14 4 15.34 4 18V20H20V18C20 16.66 14.67 14 12 14Z" fill="currentColor"/>
            </svg>
            <span>Continue as Guest</span>
        </button>
    </div>

    <div class="user-info">
        <div class="user-avatar-container">
            <img class="user-photo" src="" alt="Avatar">
        </div>
        <div class="user-display-name"></div>
        <button class="logout">
            <span>Sign out</span>
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="20">
                <path d="M17 7L15.59 8.41L18.17 11H8V13H18.17L15.59 15.59L17 17L22 12L17 7ZM4 5H12V3H4C2.9 3 2 3.9 2 5V19C2 20.1 2.9 21 4 21H12V19H4V5Z" fill="currentColor"/>
            </svg>
        </button>
    </div>

</div>
    <section class="booster">
    <div class="container">
<ul class="events-list" data-id="${ev.id}"></ul>
<!-- <div class="event__back"><img src="../img/backk.png" alt=""></div> -->
<div class="pagination" id="pagination"></div>
    </div>
</section>
    <footer class="footer">
    <div class="container">
        <p class="footer__text">© 2021 | All Rights Reserved | <span>Developed with<a class="footer__link footer-open-modal" ><span class="footer__heart ">❤</span>by GoIT Students</a></span></p>
    </div>
</footer>

<!-- scroll -->

<a href="#top">
<div class="scroll-up scroll-up--active"><svg class="scroll-up__svg" viewBox="-2 -2 52 52">
        <path class="scroll-up__svg-path" d="M24,0 a24,24 0 0,1 0,48 a24,24 0 0,1 0,-48"
            style="transition: stroke-dashoffset 20ms; stroke-dashoffset: 8.54697;"></path>
    </svg> 
    <svg class="scroll-up__svg-arrow" id="icon-up-arrow" viewBox="0 0 32 32"><path
            d="M17.114 0.325c-0.216-0.433-0.92-0.433-1.136 0-1.839 3.354-3.516 6.762-4.49 10.44-0.108 0.541 0.487 1.082 0.974 0.757 1.082-0.757 2.001-1.677 2.813-2.759-0.216 7.573-1.244 15.416 0.541 22.881 0.108 0.541 1.028 0.433 0.974-0.108-0.974-7.735-0.216-15.416-0.108-23.152 0.92 0.811 1.839 1.623 2.705 2.434 0.379 0.379 1.19 0.162 1.136-0.487-0.433-3.57-1.623-6.924-3.408-10.007zM16.519 6.762c-0.325-0.487-1.244-0.379-1.244 0.379 0 0.054 0 0.108 0 0.108-0.649 0.649-1.244 1.298-1.947 1.947 0.866-2.488 1.947-4.814 3.191-7.14 1.082 2.11 1.893 4.273 2.326 6.599-0.595-0.541-1.244-1.082-1.839-1.677-0.108-0.216-0.324-0.27-0.487-0.216z"></path>
    </svg></div></a>
    <div class="backdrop backdrop-hidden" data-modal>
  <div class="modal">
    <button class="modal-close-btn" data-close>✕</button>
    <div class="modal__wrap"></div>
  </div>
</div>

                <p class="role">Scrum-Master</p>
                <div class="icons">
                    <a href="#"><i class="ion-social-linkedin-outline"></i></a>

</div>
